  <text x="348" y="110" font-size="42" font-weight="700" fill="#1e3a5f" letter-spacing="0.5" style="fill:rgb(30, 58, 95);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Playfair Display&quot;, Georgia, serif;font-size:42px;font-weight:700;text-anchor:start;dominant-baseline:auto">E-Library</text>

