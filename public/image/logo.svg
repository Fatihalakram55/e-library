  <text x="350" y="138" font-size="10.5" font-weight="400" fill="#64748b" letter-spacing="2.5" style="fill:rgb(100, 116, 139);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Sans&quot;, sans-serif;font-size:10.5px;font-weight:400;text-anchor:start;dominant-baseline:auto">PLATFORM LITERASI DIGITAL</text>

